data:
  universe_source: coingecko
  universe_size: 50
  universe_ttl_hours: 24.0  # CoinGecko universe snapshot TTL
  start: "2020-01-01"
  end: "2025-01-31"
  cache_dir: ./cache
  ohlcv_source: binance_futures
  funding_source: binance_futures
  taker_source: binance_futures
  oi_source: bybit_v5
  ls_source: bybit_v5
  rate_limit_calls_per_min: 30
  funding_lookahead_shift_periods: 1
  nan_max_gap_days: 3

factors:
  pool:
    - MOM_1D
    - MOM_7D
    - MOM_30D
    - MOM_90D
    - FUNDING_RATE
    - FUNDING_RATE_ZS
    - TAKER_BUY_RATIO
    - TAKER_NET_VOLUME
    - OI_CHANGE
    - OI_USD
    - LS_RATIO
    - LS_RATIO_ZS
    - VOL_30D
    - LOG_MCAP
    - AMIHUD
    - SKEW_30D
  winsorize_percentiles: [1, 99]
  neutralize_category: true
  category_source: coingecko

gp:
  pop_size: 200
  n_gen: 100
  min_depth: 2
  max_depth: 4
  max_nodes: 17
  crossover_prob: 0.5
  mutation_prob: 0.2
  parsimony: 1.4

engine:
  elite_ratio: 0.10
  tournament_size: 2
  mu: 200
  lambda_: 200
  n_workers: -1

optimization:
  is_end: "2025-01-01"

fitness:
  fwd_return_horizon_days: 7

backtest:
  is_days: 730
  oos_days: 545
  step_days: 365
  long_short_decile: 0.20
  transaction_cost_bps: 5

validation:
  deflated_sharpe_n_trials: 5000
  jaccard_k_runs: 10
  jaccard_threshold: 0.7
  permutation_n: 1000
  is_oos_gap_threshold: 0.50

reporting:
  output_dir: ./output_real_optim_v2
